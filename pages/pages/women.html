<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Women - Random Shop</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="../index.html">Random Shop</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="electronics.html">Electronics</a>
      <a href="men.html">Men</a>
      <a href="women.html" aria-current="page">Women</a>
      <a href="../cart.html" id="cart-link">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Women</h1>
      <p>Discover women’s styles and accessories.</p>
    </section>

    <section id="products" class="product-grid"></section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Random Shop</p>
  </footer>

  <script>
  // Category page renderer (filters by "women")
  async function renderCategory(category) {
    const res = await fetch('../data/items.json');
    const items = await res.json();
    const container = document.getElementById('products');
    const year = document.getElementById('year');
    if (year) year.textContent = new Date().getFullYear();
    const filtered = items.filter(i => i.category && i.category.toLowerCase() === category);
    if (!filtered.length) {
      container.innerHTML = '<p>No products found in this category.</p>';
      return;
    }
    container.innerHTML = filtered.map(p => `
      <article class="card">
        <img src="../${p.image}" alt="${p.name}" onerror="this.src='../images/placeholder.png'"/>
        <h3>${p.name}</h3>
        <p class="price">₹${p.price.toFixed(2)}</p>
        <button class="btn add" data-id="${p.id}">Add to cart</button>
      </article>
    `).join('');
    document.querySelectorAll('.btn.add').forEach(b => {
      b.addEventListener('click', () => {
        addToCart(b.dataset.id);
        updateCartCount();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderCategory('women');
    updateCartCount();
  });
  </script>

  <script src="../js/cart.js"></script>
</body>
</html>
